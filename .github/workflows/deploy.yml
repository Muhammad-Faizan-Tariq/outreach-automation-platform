name: 🚀 Deploy Outreach Frontend

on:
  push:
    branches:
      - main

jobs:

  deploy:
    name: Deploy to Hetzner
    runs-on: self-hosted

    steps:

      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📝 Create .env File
        env:
          ENV_FILE: ${{ secrets.OUTREACH_ENV_FILE }}
        run: |
          mkdir -p /home/github-runner/outreach-frontend
          echo "$ENV_FILE" > /home/github-runner/outreach-frontend/.env

      - name: 🚀 Deploy
        run: |
          set -e

          docker tag outreach_frontend:latest outreach_frontend:rollback 2>/dev/null || true

          cd $GITHUB_WORKSPACE
          docker build -t outreach_frontend:latest .

          docker stop outreach-frontend 2>/dev/null || true
          docker rm outreach-frontend 2>/dev/null || true

          docker run -d \
            --name outreach-frontend \
            --restart always \
            -p 3002:3002 \
            --env-file /home/github-runner/outreach-frontend/.env \
            outreach_frontend:latest

          sleep 30

          for i in 1 2 3; do
            if curl -sf http://localhost:3002; then
              echo "✅ Deployment successful!"
              exit 0
            fi
            echo "⏳ Try $i failed..."
            sleep 10
          done

          docker stop outreach-frontend 2>/dev/null || true
          docker rm outreach-frontend 2>/dev/null || true
          docker run -d \
            --name outreach-frontend \
            --restart always \
            -p 3002:3002 \
            --env-file /home/github-runner/outreach-frontend/.env \
            outreach_frontend:rollback 2>/dev/null || true
          exit 1

      - name: ✅ Deployment Complete
        if: success()
        run: echo "🎉 Deployed at http://178.105.57.201:3002"

      - name: ❌ Deployment Failed
        if: failure()
        run: echo "💥 Deployment FAILED!"
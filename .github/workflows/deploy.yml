name: 🚀 Deploy Outreach Frontend

on:
  push:
    branches:
      - main

jobs:

  deploy:
    name: Deploy to Hetzner
    runs-on: self-hosted

    steps:

      # ── Step 1: Code checkout ──────────────────────
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # ── Step 2: .env file banao ────────────────────
      - name: 📝 Create .env File
        env:
          ENV_FILE: ${{ secrets.OUTREACH_ENV_FILE }}
        run: |
          mkdir -p /home/github-runner/outreach-frontend
          echo "$ENV_FILE" > /home/github-runner/outreach-frontend/.env

      # ── Step 3: Deploy ─────────────────────────────
      - name: 🚀 Deploy
        run: |
          set -e

          echo "💾 Backup current image..."
          docker tag outreach_frontend:latest outreach_frontend:rollback 2>/dev/null || true

          echo "📁 Code copy karo..."
          mkdir -p /home/github-runner/outreach-frontend
          cp -r $GITHUB_WORKSPACE/. /home/github-runner/outreach-frontend/

          echo "🔨 Docker image build karo..."
          cd /home/github-runner/outreach-frontend
          docker build -t outreach_frontend:latest .

          echo "⏹️ Purana container band karo..."
          docker stop outreach-frontend 2>/dev/null || true
          docker rm outreach-frontend 2>/dev/null || true

          echo "▶️ Naya container start karo..."
          docker run -d \
            --name outreach-frontend \
            --restart always \
            -p 3002:3002 \
            --env-file /home/github-runner/outreach-frontend/.env \
            outreach_frontend:latest

          echo "⏳ 30 seconds wait karo..."
          sleep 30

          echo "🏥 Health check..."
          for i in 1 2 3; do
            if curl -sf http://localhost:3002; then
              echo "✅ Deployment successful!"
              exit 0
            fi
            echo "⏳ Try $i failed, 10 second wait..."
            sleep 10
          done

          echo "❌ Health check failed! Rollback..."
          docker stop outreach-frontend 2>/dev/null || true
          docker rm outreach-frontend 2>/dev/null || true
          docker run -d \
            --name outreach-frontend \
            --restart always \
            -p 3002:3002 \
            --env-file /home/github-runner/outreach-frontend/.env \
            outreach_frontend:rollback 2>/dev/null || true
          exit 1

      # ── Step 4: Success ───────────────────────────
      - name: ✅ Deployment Complete
        if: success()
        run: echo "🎉 Outreach Frontend deployed at http://178.105.57.201:3002"

      # ── Step 5: Failure ───────────────────────────
      - name: ❌ Deployment Failed
        if: failure()
        run: echo "💥 Deployment FAILED — Rollback ho gaya!"